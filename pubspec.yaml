version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  
  font_awesome_flutter: ^10.7.0

  
  supabase_flutter: ^2.9.1



  cupertino_icons: ^1.0.8
